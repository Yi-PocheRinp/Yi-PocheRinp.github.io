<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yi-PocheRinp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --fg: #e8e8e8;
      --sub: #888;
      --link-bg: #1a1a1a;
      --link-hover: #252525;
      --border: #2a2a2a;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3a3a5c, #1a1a2e);
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 1px solid var(--border);
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    .bio {
      font-size: 0.82rem;
      color: var(--sub);
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.1rem;
      background: var(--link-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: background 0.15s, border-color 0.15s;
    }

    .link:hover {
      background: var(--link-hover);
      border-color: #3a3a3a;
    }

    .link svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.75;
    }

    .link span { flex: 1; text-align: left; }

    footer {
      margin-top: 2.5rem;
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="avatar">🌿</div>

    <h1>Yi-PocheRinp</h1>
    <p class="bio">創作 / 日常 / 技術</p>

    <div class="links">

</html>
